<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-950 text-slate-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | FinAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-slate-950 px-4">
    <div class="w-full max-w-md bg-slate-900/90 border border-slate-800 rounded-3xl p-8 shadow-2xl shadow-black/20">
        <h1 class="text-3xl font-bold text-white mb-2">Login</h1>
        <p class="text-sm text-slate-400 mb-6">Access your FinAI dashboard.</p>
        {% if error %}
        <div class="mb-4 rounded-2xl bg-rose-500/10 border border-rose-500/20 p-4 text-sm text-rose-200">{{ error }}</div>
        {% endif %}
        <form method="POST" class="space-y-4">
            <label class="block text-sm text-slate-300">Username or Email</label>
            <input name="identifier" type="text" required class="w-full rounded-2xl border border-slate-700 bg-slate-950/70 px-4 py-3 text-slate-100 outline-none focus:border-indigo-500">
            <label class="block text-sm text-slate-300">Password</label>
            <input name="password" type="password" required class="w-full rounded-2xl border border-slate-700 bg-slate-950/70 px-4 py-3 text-slate-100 outline-none focus:border-indigo-500">
            <button type="submit" class="w-full rounded-2xl bg-indigo-600 px-4 py-3 text-sm font-semibold text-white hover:bg-indigo-500 transition">Login</button>
        </form>
        <div class="mt-6 flex justify-between text-sm text-slate-400">
            <a href="/forgot-password" class="hover:text-white">Forgot password?</a>
            <a href="/register" class="hover:text-white">Create account</a>
        </div>
    </div>
</body>
</html>
